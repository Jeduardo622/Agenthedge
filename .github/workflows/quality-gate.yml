name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: "1.8.4"

      - name: Install dependencies
        run: poetry install --with dev

      - name: Upgrade audit tooling runtime
        run: poetry run python -m pip install --upgrade "pip>=26.1.2"

      - name: Run tests with coverage gate
        run: poetry run pytest --cov=src --cov-fail-under=80

      - name: Type checks
        run: poetry run mypy src

      - name: Lint
        run: poetry run flake8 src tests

      - name: Packaging smoke check
        run: |
          poetry build
          poetry run python scripts/package_smoke.py

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign and verify wheel artifact
        run: |
          wheel_path=$(ls dist/*.whl | head -n 1)
          cosign sign-blob --yes "$wheel_path" --output-signature "${wheel_path}.sig" --output-certificate "${wheel_path}.pem"
          cosign verify-blob "$wheel_path" \
            --signature "${wheel_path}.sig" \
            --certificate "${wheel_path}.pem" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/quality-gate.yml@.*$"

      - name: Dependency vulnerability audit
        run: poetry run pip-audit

  postgres-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - durable-bus
          - failover-e2e
          - break-glass-e2e
          - migration-rollback
          - failover-drill
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agenthedge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/agenthedge
      RUNTIME_BACKEND: postgres
      RUNTIME_PROFILE: staging
      BREAK_GLASS_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: "1.8.4"

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run integration matrix target
        run: |
          if [ "${{ matrix.suite }}" = "durable-bus" ]; then
            poetry run pytest tests/integration/test_postgres_bus_integration.py -k "delivery_isolated_and_ordered or slow_subscriber_does_not_block_others or wait_until_caught_up_respects_target_event or reports_non_zero_retry_rate_on_handler_failure" -q
          elif [ "${{ matrix.suite }}" = "failover-e2e" ]; then
            poetry run pytest tests/integration/test_postgres_bus_integration.py -k "checkpoint_rejects_stale_owner_after_failover or durable_subscription_takeover_recovers_processing_delivery or runtime_failover_preserves_dedupe_at_storage_boundary" -q
          elif [ "${{ matrix.suite }}" = "break-glass-e2e" ]; then
            poetry run pytest tests/integration/test_break_glass_integration.py -q
          elif [ "${{ matrix.suite }}" = "migration-rollback" ]; then
            poetry run python scripts/migration_rollback_simulation.py --dsn "$POSTGRES_DSN"
          else
            poetry run python scripts/failover_drill.py --dsn "$POSTGRES_DSN"
          fi
